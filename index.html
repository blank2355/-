<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>快捷记账 Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
</head>
<body>
<div class="ls" id="loginScreen">
<div class="lc">
<div class="ll">\U0001f4b0</div>
<div class="lt">快捷记账 Pro</div>
<div class="fg"><label class="fl">用户名</label><input type="text" class="fi" id="loginUsername" placeholder="请输入用户名"></div>
<div class="fg"><label class="fl">密码</label><input type="password" class="fi" id="loginPassword" placeholder="请输入密码"></div>
<button class="lb" onclick="handleLogin()">登 录</button>
<div class="le" id="loginError"></div>
</div>
</div>
<div id="mainApp" style="display:none">
<div class="hd">
<div class="ht"><h1>\U0001f4b0 快捷记账</h1><div class="ha"><button class="ib" onclick="showSettings()">\u2699\ufe0f</button><button class="ib" onclick="handleLogout()">\U0001f6aa</button></div></div>
<div class="bd"><div class="bl">本月结余</div><div class="ba" id="balanceAmount">\u00a50.00</div><div class="bp" id="balancePeriod"></div></div>
</div>
<div class="sr">
<div class="sc in"><div class="lb2">本月收入</div><div class="vl" id="monthIncome">\u00a50</div></div>
<div class="sc ex"><div class="lb2">本月支出</div><div class="vl" id="monthExpense">\u00a50</div></div>
</div>
<div class="tb">
<button class="tbtn ac" onclick="switchTab(0,this)">\U0001f4dd 明细</button>
<button class="tbtn" onclick="switchTab(1,this)">\U0001f4ca 统计</button>
<button class="tbtn" onclick="switchTab(2,this)">\u2699\ufe0f 设置</button>
</div>
<div class="tab-content" id="tabRecords">
<div class="sec">
<div class="sh"><span class="st">最近记录</span><span class="sa" onclick="exportData()">\U0001f4e4 导出</span></div>
<div id="recordsList"><div class="es"><div class="ei">\U0001f4ed</div><div class="et">点击上方 + 开始记账</div></div></div>
</div>
</div>
<div class="tab-content" id="tabCharts" style="display:none">
<div class="cc">
<div class="ctb">
<button class="ctbtn ac" onclick="switchChart(0,this)">支出分类</button>
<button class="ctbtn" onclick="switchChart(1,this)">收入分类</button>
<button class="ctbtn" onclick="switchChart(2,this)">每日趋势</button>
</div>
<canvas id="mainChart"></canvas>
</div>
</div>
<div class="tab-content settings-page" id="tabSettings" style="display:none">
<div class="sg">
<div class="si" onclick="backupData()"><div class="sic" style="background:#dbeafe">\U0001f4be</div><div class="sl2">备份数据</div><div class="sar">\u203a</div></div>
<div class="si" onclick="importData()"><div class="sic" style="background:#d1fae5">\U0001f4e5</div><div class="sl2">恢复数据</div><div class="sar">\u203a</div></div>
<div class="si" onclick="clearAllData()"><div class="sic" style="background:#fee2e2">\U0001f5d1\ufe0f</div><div class="sl2">清空所有数据</div><div class="sar">\u203a</div></div>
</div>
</div>
<button class="fb" onclick="openAddModal()">+</button>
<div class="mo" id="addModal">
<div class="ml">
<div class="mh"></div>
<div class="mt">记一笔</div>
<div class="tt">
<button class="ttb ac ex" onclick="setType('expense')">\U0001f4b8 支出</button>
<button class="ttb" onclick="setType('income')">\U0001f4b0 收入</button>
</div>
<div class="aiw"><span class="cs">\u00a5</span><input type="number" class="ai" id="amountInput" placeholder="0.00" step="0.01" inputmode="decimal"></div>
<div class="cg" id="categoryGrid"></div>
<input type="text" class="ni" id="noteInput" placeholder="备注（可选）">
<button class="sb" id="submitBtn" onclick="addRecord()" disabled>确认记账</button>
</div>
</div>
<div class="tst" id="toast"></div>
</div>
<script src="app.js"><\/script>
</body>
</html>
